name: Update literature tracker

on:
  schedule:
    # Every Monday at 01:30 UTC (09:30 CST).
    - cron: "30 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-literature-tracker
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and merge papers
        run: python scripts/update_literature_data.py --limit-per-query 10 --sleep 2

      - name: Commit and push if data changed
        run: |
          if git diff --quiet -- data/papers.js; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/papers.js
          git commit -m "Update literature tracker data."
          git push
